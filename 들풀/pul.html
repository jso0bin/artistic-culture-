          <p class="text1">"역사의 소용돌이 속에서 피어난 백성들의 함성"</p>

          <p class="text2">"사람이 사람답게 살고 싶다는 것이 어찌 죄가 된단 말인가! 이 썩어빠진 세상에서 우리가 기댈 곳은 오직 우리 서로의 손뿐이다.".</p>

          <p class="text3">"밟으면 밟힐수록 더 푸르게 일어나는 것이 들풀이다. 우리가 죽어 이 땅의 거름이 된다 한들, 우리 자식들은 더 나은 세상에서 살지 않겠느냐."</p>

          <p class="text4">"바람이 불면 눕지만, 바람보다 먼저 일어난다. 우리가 함께 스크럼을 짜고 버틴다면, 그 어떤 거센 폭풍우도 우리를 꺾지 못할 것이다."</p>
